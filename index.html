<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title -->
  <title>Aliza Arshad | Website developer</title>

  <!-- Primary Meta Tags -->
  <meta
    name="description"
    content="A short and compelling description of your website in 150-160 characters."
  />
  <meta
    name="keywords"
    content="keyword1, keyword2, keyword3, keyword4"
  />
  <meta name="author" content="Your Name or Company" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="English" />
  <meta name="revisit-after" content="7 days" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://www.example.com/" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Open Graph (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.example.com/" />
  <meta property="og:title" content="Your Website Name" />
  <meta
    property="og:description"
    content="A compelling description for social media sharing."
  />
  <meta
    property="og:image"
    content="https://www.example.com/og-image.jpg"
  />
  <meta property="og:site_name" content="Your Website Name" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://www.example.com/" />
  <meta name="twitter:title" content="Your Website Name" />
  <meta
    name="twitter:description"
    content="A compelling description for Twitter."
  />
  <meta
    name="twitter:image"
    content="https://www.example.com/twitter-image.jpg"
  />

  <!-- Theme Color -->
  <meta name="theme-color" content="#ffffff" />

  <!-- Apple -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  />

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
